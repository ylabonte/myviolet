version: 2

# GitHub Actions updates are owned by `.github/workflows/update-github-actions.yml`
# (driven by `ylabonte/github-actions-updater@v1`). Dependabot is scoped to Python
# deps only here.

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - ylabonte
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      aiohttp-stack:
        patterns:
          - "aiohttp"
          - "yarl"
      dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "pytest*"
          - "aioresponses"
      docs-tools:
        patterns:
          - "mkdocs*"
          - "mkdocstrings*"
